<html>
<head>

    <style>
        #map { height: 90vh; width: 100%; }
        #control {
            padding: 10px; background: white;
            position: absolute; top: 10px; left: 10px;
            z-index: 1000; border-radius: 5px;
        }
        .legend {
            background: white;
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            max-height: 300px;
            overflow-y: auto;
        }
        .legend-color-box {
            display: inline-block;
            margin-right: 6px;
            vertical-align: middle;
            border-radius: 50%;
        }
    </style>
</head>

        const metricBins = {"Waste Per Day": [[500, "Low"], [1500, "Medium Low"], [3000, "Medium"], [6000, "Medium High"], [Infinity, "High"]], "Usable Waste Per Day": [[300, "Low"], [1000, "Medium Low"], [2000, "Medium"], [4000, "Medium High"], [Infinity, "High"]], "Electricity per Capita": [[500, "Low"], [1000, "Medium Low"], [2000, "Medium"], [4000, "Medium High"], [Infinity, "High"]], "WtE Potential (GWs)": [[0.01, "Low"], [0.05, "Medium Low"], [0.1, "Medium"], [0.3, "Medium High"], [Infinity, "High"]], "WtE as % of Energy Needs": [[5, "Low"], [10, "Medium Low"], [20, "Medium"], [40, "Medium High"], [Infinity, "High"]]};
        const colorMap = {"Low": "#320c44", "Medium Low": "#8a74a2", "Medium": "#cacaca", "Medium High": "#bdd8aa", "High": "#507444"};
        const legendRanges = {"Waste Per Day": {"unit": "MT/day", "ranges": [["Low", "< 500"], ["Medium Low", "500\u20131500"], ["Medium", "1500\u20133000"], ["Medium High", "3000\u20136000"], ["High", "> 6000"]]}, "Usable Waste Per Day": {"unit": "MT/day", "ranges": [["Low", "< 300"], ["Medium Low", "300\u20131000"], ["Medium", "1000\u20132000"], ["Medium High", "2000\u20134000"], ["High", "> 4000"]]}, "Electricity per Capita": {"unit": "kWh", "ranges": [["Low", "< 500"], ["Medium Low", "500\u20131000"], ["Medium", "1000\u20132000"], ["Medium High", "2000\u20134000"], ["High", "> 4000"]]}, "WtE Potential (GWs)": {"unit": "GWs", "ranges": [["Low", "< 0.01"], ["Medium Low", "0.01\u20130.05"], ["Medium", "0.05\u20130.1"], ["Medium High", "0.1\u20130.3"], ["High", "> 0.3"]]}, "WtE as % of Energy Needs": {"unit": "%", "ranges": [["Low", "< 5%"], ["Medium Low", "5\u201310%"], ["Medium", "10\u201320%"], ["Medium High", "20\u201340%"], ["High", "> 40%"]]}};

        const map = L.map('map').setView([10, 10], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
        }).addTo(map);
        L.control.scale().addTo(map);

        let markers = [];

        function getColorLabel(value, bins) {
            for (let i = 0; i < bins.length; i++) {
                if (value <= bins[i][0]) return bins[i][1];
            }
            return bins[bins.length - 1][1];
        }

        function getRadiusFromLabel(label) {
            const sizeMap = {
                "Low": 6,
                "Medium Low": 10,
                "Medium": 14,
                "Medium High": 18,
                "High": 22
            };
            return sizeMap[label] || 8;
        }

        function plotMarkers(metric) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            const bins = metricBins[metric];
            cityData.forEach(city => {
                const val = parseFloat(city[metric]);
                const label = isNaN(val) ? "Low" : getColorLabel(val, bins);
                const color = colorMap[label];
                const radius = getRadiusFromLabel(label);
                const popupVal = isNaN(val) ? "Data not available" : val.toLocaleString();

                const marker = L.circleMarker([city.Latitude, city.Longitude], {
                    radius: radius,
                    fillColor: color,
                    color: "#000",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.7
                }).bindPopup(
                    `<strong>${city.City}, ${city.Country}</strong><br>` +
                    `Population: ${city.Population.toLocaleString()}<br>` +
                    `${metric}: ${popupVal}`
                );
                marker.addTo(map);
                markers.push(marker);
            });
            updateLegend(metric);
        }

        function updateLegend(metric) {
            const div = document.querySelector(".legend");
            if (!div) return;
            const entries = legendRanges[metric].ranges;
            const unit = legendRanges[metric].unit;
            let html = `<strong>Legend for ${metric}</strong><br>`;
            entries.forEach(([label, range]) => {
                const color = colorMap[label];
                const size = getRadiusFromLabel(label);
                html += `
                  <div>
                    <span class="legend-color-box" style="background:${color}; width:${size}px; height:${size}px;"></span>
                    <strong>${label}:</strong> ${range} ${unit}
                  </div>`;
            });
            div.innerHTML = html;
        }

        document.getElementById('metric').addEventListener('change', e => {
            plotMarkers(e.target.value);
        });

        const legend = L.control({ position: "bottomright" });
        legend.onAdd = function () {
            return L.DomUtil.create("div", "legend");
        };
        legend.addTo(map);

        plotMarkers("Waste Per Day");
        updateLegend("Waste Per Day");
    </script>
